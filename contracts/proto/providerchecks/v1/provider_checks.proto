syntax = "proto3";

package providerchecks.v1;

option go_package = "mytonprovider-contracts/gen/go/providerchecks/v1;providerchecksv1";

// ProviderChecksService runs network-dependent provider BAG checks
// from a single agent location. Coordinator performs 1-of-3 aggregation.
service ProviderChecksService {
  rpc RunChecks(RunChecksRequest) returns (RunChecksResponse);
  // RunStorageRates queries storage rates (GetStorageRates) per provider pubkey from this agent.
  // Coordinator owns batching, schedule, and 1-of-3 aggregation. Agents enforce a max batch size.
  rpc RunStorageRates(RunStorageRatesRequest) returns (RunStorageRatesResponse);
}

message RunChecksRequest {
  string job_id = 1;
  repeated ProviderBatch providers = 2;
  CheckTimeouts timeouts = 3;
}

message ProviderBatch {
  string provider_pubkey = 1;
  string provider_address = 2;
  Endpoint storage_endpoint = 3;
  repeated ContractRef contracts = 4;
}

message Endpoint {
  string ip = 1;
  int32 port = 2;
  bytes adnl_pubkey = 3;
}

message ContractRef {
  string contract_address = 1;
  string bag_id = 2;
}

message CheckTimeouts {
  uint32 ping_ms = 1;
  uint32 rldp_ms = 2;
  uint32 total_ms = 3;
}

message StorageRatesTimeouts {
  // Per-provider GetStorageRates deadline; 0 = agent default (see implementation).
  uint32 query_timeout_ms = 1;
  // Optional wall-clock cap for the entire RPC (same idea as CheckTimeouts.total_ms).
  uint32 total_ms = 2;
}

// RunStorageRatesRequest must stay within the agent max pubkey limit (see agent validation).
message RunStorageRatesRequest {
  string job_id = 1;
  // Hex-encoded 32-byte provider ADNL public keys (64 hex chars), same as coordinator DB public_key.
  repeated string provider_pubkeys = 2;
  // Size passed to GetStorageRates (coordinator uses 1). 0 means 1.
  uint64 query_size = 3;
  StorageRatesTimeouts timeouts = 4;
}

message StorageRatesResult {
  string provider_pubkey = 1;
  bool ok = 2;
  bool available = 3;
  bytes rate_per_mb_day = 4;
  bytes min_bounty = 5;
  uint64 space_available_mb = 6;
  uint32 min_span = 7;
  uint32 max_span = 8;
  uint32 latency_ms = 9;
  string details = 10;
}

message RunStorageRatesResponse {
  string job_id = 1;
  string agent_id = 2;
  string location = 3;
  int64 started_at_unix = 4;
  int64 finished_at_unix = 5;
  repeated StorageRatesResult results = 6;
  repeated ErrorDetail warnings = 7;
}

enum ReasonCode {
  REASON_CODE_UNSPECIFIED = 0;

  VALID_STORAGE_PROOF = 1;

  IP_NOT_FOUND = 101;
  NOT_FOUND = 102;
  UNAVAILABLE_PROVIDER = 103;
  CANT_CREATE_PEER = 104;
  UNKNOWN_PEER = 105;

  PING_FAILED = 201;
  INVALID_BAG_ID = 202;
  FAILED_INITIAL_PING = 203;

  GET_INFO_FAILED = 301;
  INVALID_HEADER = 302;

  CANT_GET_PIECE = 401;
  CANT_PARSE_BOC = 402;
  PROOF_CHECK_FAILED = 403;
}

message RunChecksResponse {
  string job_id = 1;
  string agent_id = 2;
  string location = 3;
  int64 started_at_unix = 4;
  int64 finished_at_unix = 5;
  repeated ContractCheckResult results = 6;
  repeated ErrorDetail warnings = 7;
}

message ContractCheckResult {
  string provider_pubkey = 1;
  string provider_address = 2;
  string contract_address = 3;
  string bag_id = 4;
  ReasonCode reason_code = 5;
  uint32 latency_ms = 6;
  string details = 7;
}

enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  INVALID_ARGUMENT = 1;
  NOT_FOUND_ERROR = 2;
  DEADLINE_EXCEEDED = 3;
  UNAVAILABLE = 4;
  INTERNAL = 5;
}

message ErrorDetail {
  ErrorCode code = 1;
  string message = 2;
  bool retryable = 3;
}
