# Prometheus + Grafana for scraping the agent's /metrics (HTTP).
# Agent on the host must listen on 0.0.0.0:9090 (not only 127.0.0.1) so this stack can reach it from Docker.
#
# Usage: from this directory: docker compose up -d
#   Prometheus UI: http://127.0.0.1:9091
#   Grafana:       http://127.0.0.1:3000  (admin / see GF_SECURITY_ADMIN_PASSWORD below)

services:
  prometheus:
    image: prom/prometheus:v2.55.1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_tsdb:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  prometheus_tsdb:
  grafana_data:
