# Scrape the mytonprovider agent metrics HTTP endpoint on the Docker host.
# Requires agent env: AGENT_METRICS_LISTEN_ADDR=0.0.0.0:9090
# (127.0.0.1:9090 is usually NOT reachable from containers on Linux.)

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: mytonprovider-agent
    static_configs:
      - targets: ["host.docker.internal:9090"]
        labels:
          service: agent
