services:
  agent:
    image: ${AGENT_IMAGE}
    pull_policy: always
    restart: unless-stopped
    env_file:
      - .env.hub
    ports:
      - "${AGENT_GRPC_PORT:-8443}:8443/tcp"
      - "${AGENT_ADNL_PORT:-16167}:16167/udp"
    volumes:
      - ./secrets:/run/secrets:ro

  loki:
    image: grafana/loki:2.9.4
    restart: unless-stopped
    ports:
      - "${LOKI_PORT:-3100}:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9091}:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_tsdb:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    depends_on:
      - agent

  grafana:
    image: grafana/grafana:11.3.0
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - grafana_data:/var/lib/grafana
      - ../../observability/prometheus-grafana/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../observability/prometheus-grafana/grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki

volumes:
  loki_data:
  prometheus_tsdb:
  grafana_data:
